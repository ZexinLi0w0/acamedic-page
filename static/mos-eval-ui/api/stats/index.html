<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />

    <title>MOS Eval Stats</title>
    <style>
      body {
        margin: 0;
        padding: 40px 20px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        line-height: 1.5;
        background: #fafafa;
        color: #1a1a1a;

      .card {

        margin: 0 auto;
        background: #fff;

      }

        background: #f3f4f6;

        border-radius: 6px;
      }

  <body>
    <div class="card">
      <h1>MOS Eval Stats</h1>
      <p>
        This deployment now stores ratings through <code>Netlify Forms</code>

        Use the Netlify project Forms tab to inspect or export submissions for
        the <code>mos-eval-score</code> form.
      </p>
      <p>

      </p>
